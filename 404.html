<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | DFW Roofing Contractors</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root{--bg3:#1a2744;--red:#c0392b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Open Sans",sans-serif;background:var(--bg3);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
    .box{max-width:480px}
    .num{font-family:"Montserrat",sans-serif;font-weight:800;font-size:6rem;color:var(--red);line-height:1}
    h1{font-family:"Montserrat",sans-serif;font-weight:700;font-size:1.6rem;margin:0.75rem 0 0.5rem}
    p{color:rgba(255,255,255,0.65);margin-bottom:2rem}
    a.btn{display:inline-block;padding:0.85rem 2.2rem;background:var(--red);color:#fff;border-radius:8px;font-weight:700;font-family:"Open Sans",sans-serif;text-decoration:none;transition:opacity 0.2s}
    a.btn:hover{opacity:0.85}
    <meta http-equiv="refresh" content="5;url=/">
  </style>
</head>
<body>
  <div class="box">
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. Redirecting to the homepage in 5 seconds.</p>
    <a href="/" class="btn">Go to Homepage</a>
  </div>
  <script>setTimeout(()=>{window.location.href='/'},5000);</script>
</body>
</html>
